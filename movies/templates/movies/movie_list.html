<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineShare - Movie Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #14181c;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .movie-card {
            transition: transform 0.2s;
            border: none;
            background: transparent;
            text-decoration: none; /* ลบขีดเส้นใต้ลิงก์ */
        }
        .movie-card:hover {
            transform: scale(1.05);
            cursor: pointer;
            z-index: 10;
        }
        .poster-img {
            border-radius: 4px;
            border: 1px solid #456;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        /* ทำให้ลิงก์ไม่เปลี่ยนสีตอนเอาเมาส์ชี้ */
        a.movie-link { text-decoration: none; color: white; }
        a.movie-link:hover { color: #ccc; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color: #2c3440; border-bottom: 1px solid #456;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">🎥 CineShare</a>
            
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <li class="nav-item text-white me-3">
                            Hello, <span class="fw-bold text-success">{{ user.username }}</span>
                        </li>
                        <li class="nav-item">
                            <form action="{% url 'logout' %}" method="post">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-danger btn-sm">Log Out</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'login' %}">Sign In</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-success text-white ms-2" href="{% url 'signup' %}">Create Account</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h4 class="mb-3 border-bottom pb-2 border-secondary">Popular Movies</h4>
        
        <div class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-4">
            
            {% for movie in movies %}
            <div class="col">
                <a href="{% url 'movie_detail' movie.id %}" class="movie-link">
                    <div class="movie-card h-100">
                        <img src="{{ movie.poster_url }}" class="card-img-top poster-img" alt="{{ movie.title }}">
                        <div class="mt-2 text-center d-none d-md-block">
                            <small class="fw-bold">{{ movie.title }}</small>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
