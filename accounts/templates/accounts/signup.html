<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CineShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #14181c; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background-color: #2c3440; border: none; width: 100%; max-width: 400px; }
        .form-control { background-color: #445566; border: none; color: white; }
        .form-control:focus { background-color: #556677; color: white; box-shadow: none; }
        label { margin-bottom: 5px; color: #9ab; }
        ul { list-style: none; padding-left: 0; font-size: 0.8rem; color: #ff6b6b; } /* จัด style ข้อความ error */
    </style>
</head>
<body>
    <div class="card p-4 shadow-lg">
        <h2 class="text-center mb-4 fw-bold">Join CineShare</h2>
        
        <form method="post">
            {% csrf_token %} {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }} {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors }}</div>
                {% endif %}
                {% if field.help_text %}
                    <div class="text-muted small" style="font-size: 0.7em;">{{ field.help_text }}</div>
                {% endif %}
            </div>
            {% endfor %}
            
            <button type="submit" class="btn btn-success w-100 mt-3 fw-bold">Sign Up</button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">Already have an account? <a href="#" class="text-decoration-none text-info">Log in</a></small>
        </div>
    </div>

    <script>
        var inputs = document.querySelectorAll('input');
        inputs.forEach(function(input) {
            input.classList.add('form-control');
        });
    </script>
</body>
</html>
