<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - CineShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #14181c; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background-color: #2c3440; border: none; width: 100%; max-width: 400px; }
        .form-control { background-color: #445566; border: none; color: white; }
        .form-control:focus { background-color: #556677; color: white; box-shadow: none; }
        label { margin-bottom: 5px; color: #9ab; }
    </style>
</head>
<body>
    <div class="card p-4 shadow-lg">
        <h2 class="text-center mb-4 fw-bold">Welcome Back</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100 mt-3 fw-bold">Log In</button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none text-info">Sign up</a></small>
        </div>
    </div>
</body>
</html>
