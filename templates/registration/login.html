{% extends 'base.html' %}

{% block title %}Sign In - CineShare{% endblock %}

{% block content %}
<div class="container py-5 mt-lg-5 animate-up">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="auth-card">
                <div class="text-center mb-5">
                    <h2 class="fw-black text-white mb-2 h1">Welcome Back</h2>
                    <p class="text-muted">Enter your credentials to access CineShare.</p>
                </div>

                {% if form.errors %}
                <div class="alert border-0 shadow-pro mb-4 animate-up"
                    style="background: rgba(255, 71, 87, 0.1); color: #ff4757; border-left: 4px solid #ff4757 !important;">
                    <div class="small d-flex align-items-center">
                        <i class="bi bi-exclamation-octagon me-2 fs-5"></i> Invalid username or password.
                    </div>
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label text-white-50 small fw-bold tracking-wider">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg"
                            placeholder="your_username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label class="form-label text-white-50 small fw-bold tracking-wider">Password</label>
                            <a href="#" class="small text-brand text-decoration-none fw-bold opacity-75">Forgot?</a>
                        </div>
                        <input type="password" name="password" class="form-control form-control-lg"
                            placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-brand w-100 py-3 fw-black text-uppercase mt-3 shadow-pro">
                        Sign In
                    </button>
                    <input type="hidden" name="next" value="{{ next }}">
                </form>

                <div class="text-center mt-5">
                    <p class="text-muted small mb-0">New to CineShare? <a href="{% url 'signup' %}"
                            class="text-brand text-decoration-none fw-bold ms-1 hover-glow">Create account</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
